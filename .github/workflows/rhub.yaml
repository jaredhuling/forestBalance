# R-hub v2 workflow
# Triggered manually via rhub::rhub_check() or the GitHub Actions UI.
# See https://r-hub.github.io/rhub/ for details.

name: R-hub

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'A comma separated list of R-hub platforms to use.'
        type: string
        required: false
      name:
        description: 'Run name. You can leave this empty.'
        type: string
        required: false

jobs:

  rhub:
    uses: r-hub/actions/run-check@v1
    with:
      config: ${{ github.event.inputs.config }}
      name: ${{ github.event.inputs.name }}
